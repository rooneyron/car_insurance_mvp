# 车险智能客服 - 路由关键词配置
# 业务方可随时修改此文件，无需重启服务（热加载）

keywords:
  # 售前/报价类关键词（命中后切到 sale 链）
  sale:
    - "续保"
    - "报价"
    - "保费"
    - "投保"
    - "买保险"
    - "多少钱"

  # 售后/理赔类关键词（命中后切到 service 链）
  service:
    - "理赔"
    - "出险"
    - "报案"
    - "保单"
    - "投诉"
    - "转人工"
    - "人工"
    - "爆胎"
    - "刮蹭"
    - "撞车"
    - "事故"

  # 紧急强切换词（保留，可选择性使用）
  # 如果某词同时在 sale 和 service 中出现，谁先匹配谁生效
  # 如需强制优先级，可单独配置 force_service 列表
  # force_service:
  #   - "事故"
  force_service:   # 这部分是独立的
    - "事故"
    - "紧急"